<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vòng quay xịn</title>

<style>
body{
    text-align:center;
    font-family:Arial;
    background:#111;
    color:white;
}

/* ===== WHEEL ===== */
.wheel-wrapper{
    position:relative;
    width:400px;
    height:400px;
    margin:50px auto;
}

#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    overflow:hidden;

    background:conic-gradient(
        #ff4d4d 0deg 60deg,
        #ffa64d 60deg 120deg,
        #ffff66 120deg 180deg,
        #66ff66 180deg 240deg,
        #66ccff 240deg 300deg,
        #cc66ff 300deg 360deg
    );

    transition: transform 4s cubic-bezier(.2,.8,.2,1);
}

/* chữ */
#wheel span{
    position:absolute;
    top:50%;
    left:50%;
    transform-origin:0 0;
    font-size:18px;
    font-weight:bold;
}

#wheel span:nth-child(1){ transform: rotate(30deg) translate(140px); }
#wheel span:nth-child(2){ transform: rotate(90deg) translate(140px); }
#wheel span:nth-child(3){ transform: rotate(150deg) translate(140px); }
#wheel span:nth-child(4){ transform: rotate(210deg) translate(140px); }
#wheel span:nth-child(5){ transform: rotate(270deg) translate(140px); }
#wheel span:nth-child(6){ transform: rotate(330deg) translate(140px); }

/* tâm */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    background:white;
    color:black;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

/* 🔥 KIM CHỈ XỊN (line + chấm tròn) */
.pointer{
    position:absolute;
    left:-10px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    align-items:center;
}

/* chấm tròn */
.pointer::before{
    content:"";
    width:12px;
    height:12px;
    background:red;
    border-radius:50%;
    margin-right:4px;
}

/* thanh chỉ */
.pointer::after{
    content:"";
    width:40px;
    height:4px;
    background:red;
    border-radius:2px;
}

/* nút */
button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    background:#ff4d4d;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* popup */
#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
}

#popup h1{
    font-size:60px;
    color:#00ffcc;
}
nav a{
    text-decoration:none;
    padding:10px 15px;
    color:gray;
    transition:0.3s;
}

/* khi di chuột vào */
nav a:hover{
    color:red;
    background:white;
    border-radius:5px;
}
</style>
</head>

<body>
<header>
    <h1><marquee>👟Chào mừng đến với shop👟 </marquee> </h1>
    <nav>
        <a href="vuvanbac1.html">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">liên hệ</a>
        <a href="vongquay.html">Vòng quay may mắn</a>
    </nav>
</header>
<h2>🎡 Vòng quay Voucher</h2>

<div class="wheel-wrapper">
    <div class="pointer"></div>

    <div id="wheel">
        <span>10%</span>
        <span>20%</span>
        <span>50%</span>
        <span>Cái nịt</span>
        <span>Free</span>
        <span>5%</span>
    </div>

    <div class="center">GO</div>
</div>

<button onclick="spin()">QUAY</button>

<div id="popup" onclick="this.style.display='none'">
    <h1 id="text"></h1>
</div>

<script>
let data = ["10%","20%","50%","Cái Nịt","Free","5%"];

let rotation = 0;

function spin(){
    let wheel = document.getElementById("wheel");

    let spinDeg = Math.floor(Math.random()*2000 + 2000);

    rotation += spinDeg;

    wheel.style.transform = `rotate(${rotation}deg)`;

    setTimeout(()=>{
        let deg = (rotation % 360 + 360) % 360;

        let each = 360 / data.length;

        let angleAt9h = (deg + 180) % 360;

        let index = Math.floor(angleAt9h / each);

        showResult(data[index]);

    },4000);
}

function showResult(text){
    document.getElementById("text").innerText = "🎉 " + text;
    document.getElementById("popup").style.display = "flex";
}
</script>

</body>
</html>
